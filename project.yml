name: RuanKao
options:
  bundleIdPrefix: com.codexdemo
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.10
    PRODUCT_BUNDLE_IDENTIFIER: com.codexdemo.ruankao
    DEVELOPMENT_TEAM: ""
targets:
  RuanKao:
    type: application
    platform: iOS
    sources:
      - path: RuanKao
    resources:
      - path: RuanKao/Resources
    info:
      path: RuanKao/Support/Info.plist
      properties:
        UILaunchStoryboardName: LaunchScreen
        UIApplicationSupportsIndirectInputEvents: true
        LSRequiresIPhoneOS: true
        AIServiceEndpoint: ""
        AIServiceModel: ""
        AIServiceToken: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_FILE: RuanKao/Support/Info.plist
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
schemes:
  RuanKao:
    build:
      targets:
        RuanKao: all
    run:
      config: Debug
    archive:
      config: Release
